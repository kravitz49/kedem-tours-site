name: Deploy to FTP

# Заливает сайт на хостинг при каждом пуше в master,
# а также вручную через кнопку "Run workflow".
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Каталог на сервере, куда заливать. Часто это "public_html/" или "/".
          # При необходимости поменяйте под структуру хостинга.
          server-dir: ./
          # Что НЕ заливать на хостинг (служебные файлы и dev-инструменты):
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            server.py
            generate_icons.py
            _logo_script.txt
            **/__pycache__/**
            **/*.log
            README.md
