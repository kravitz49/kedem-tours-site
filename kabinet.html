<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Кедем Турс — Администратор</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c; --gold-light: #e8c96a;
      --dark: #1a1a2e; --accent: #0f3460;
      --white: #fff; --bg: #f4f6fb;
    }
    body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: #2d2d2d; min-height: 100vh; }

    /* LOGIN */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-box {
      background: var(--white); border-radius: 20px; padding: 44px 40px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.15); width: 100%; max-width: 400px; text-align: center;
    }
    .login-icon { font-size: 2.8rem; margin-bottom: 12px; }
    .login-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--accent); margin-bottom: 6px; }
    .login-sub { color: #888; font-size: 0.88rem; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 1rem; outline: none; margin-bottom: 16px; font-family: inherit;
      transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%; padding: 13px; background: linear-gradient(135deg, var(--accent), var(--dark));
      color: var(--white); border: none; border-radius: 10px; font-family: 'Montserrat', sans-serif;
      font-weight: 700; font-size: 1rem; cursor: pointer; transition: opacity .2s;
    }
    .login-btn:hover { opacity: 0.88; }
    .login-err { color: #c0392b; font-size: 0.85rem; margin-top: 10px; display: none; }

    /* ADMIN PANEL */
    .admin-wrap { display: none; }
    .admin-header {
      background: linear-gradient(135deg, var(--dark), var(--accent));
      padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .admin-logo { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--white); display: flex; align-items: center; gap: 10px; }
    .admin-logo span { color: var(--gold); }
    .logout-btn {
      background: rgba(255,255,255,0.15); color: var(--white); border: none;
      padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
      transition: background .2s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.25); }

    .admin-content { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 36px; }
    .stat-card {
      background: var(--white); border-radius: 14px; padding: 24px 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center;
    }
    .stat-icon { font-size: 2rem; margin-bottom: 10px; }
    .stat-val { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 2rem; color: var(--accent); }
    .stat-label { font-size: 0.8rem; color: #888; margin-top: 4px; }

    /* FILTERS */
    .filters { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; align-items: center; }
    .filters input, .filters select {
      padding: 9px 14px; border: 2px solid #e0e0e0; border-radius: 8px;
      font-family: inherit; font-size: 0.88rem; outline: none; transition: border-color .2s;
    }
    .filters input:focus, .filters select:focus { border-color: var(--gold); }
    .export-btn {
      margin-left: auto; padding: 9px 20px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--dark); border: none; border-radius: 8px;
      font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; transition: opacity .2s;
    }
    .export-btn:hover { opacity: 0.85; }

    /* TABLE */
    .table-wrap { background: var(--white); border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th {
      background: var(--accent); color: var(--white); padding: 13px 16px;
      text-align: left; font-family: 'Montserrat', sans-serif; font-weight: 600;
      font-size: 0.82rem; letter-spacing: 0.3px; white-space: nowrap;
    }
    thead th:first-child { border-radius: 14px 0 0 0; }
    thead th:last-child { border-radius: 0 14px 0 0; }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background .15s; }
    tbody tr:hover { background: #fafbff; }
    tbody td { padding: 12px 16px; vertical-align: middle; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 600;
    }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .del-btn {
      background: #fef2f2; color: #dc2626; border: none;
      padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
      transition: background .15s;
    }
    .del-btn:hover { background: #fee2e2; }
    .no-orders { text-align: center; padding: 48px; color: #aaa; font-size: 0.95rem; }

    /* CHART */
    .chart-section { margin-bottom: 32px; }
    .chart-title { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1rem; color: var(--accent); margin-bottom: 16px; }
    .bar-chart { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: flex; align-items: center; gap: 12px; font-size: 0.82rem; }
    .bar-label { width: 220px; flex-shrink: 0; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: #f0f0f0; border-radius: 6px; height: 20px; }
    .bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--accent), var(--gold)); min-width: 4px; transition: width .6s ease; }
    .bar-count { width: 40px; text-align: right; font-weight: 600; color: var(--accent); }

    @media (max-width: 600px) {
      .admin-header { flex-direction: column; gap: 12px; }
      .filters { flex-direction: column; }
      .export-btn { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-title">Администратор</div>
    <div class="login-sub">Кедем Турс — панель управления</div>
    <input type="password" id="passInput" placeholder="Введите пароль" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Войти</button>
    <div class="login-err" id="loginErr">Неверный пароль</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-header">
    <div class="admin-logo"><i class="fa fa-compass" style="color:var(--gold)"></i> КЕДЕМ ТУРС <span>| Панель управления</span></div>
    <button class="logout-btn" onclick="logout()"><i class="fa fa-sign-out-alt"></i> Выйти</button>
  </div>

  <div class="admin-content">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Chart -->
    <div class="chart-section">
      <div class="chart-title"><i class="fa fa-chart-bar" style="color:var(--gold)"></i> Заказы по экскурсиям</div>
      <div class="bar-chart" id="barChart"></div>
    </div>

    <!-- Filters + Table -->
    <div class="filters">
      <input type="text" id="searchInput" placeholder="🔍 Поиск по имени, телефону..." oninput="renderTable()"/>
      <select id="excFilter" onchange="renderTable()">
        <option value="">Все экскурсии</option>
      </select>
      <select id="pickupFilter" onchange="renderTable()">
        <option value="">Все остановки</option>
        <option>Каньён Авиа</option>
        <option>Каньён Шауль Ха-Мелех</option>
        <option>Гранд Каньёон</option>
        <option>Неве Зеев-Жаботински</option>
        <option>Бигудит Вицо</option>
        <option>Сорока</option>
        <option>Центр Орен</option>
      </select>
      <button class="export-btn" onclick="exportCSV()"><i class="fa fa-download"></i> Экспорт CSV</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Дата</th>
            <th>Экскурсия</th>
            <th>Имя</th>
            <th>Фамилия</th>
            <th>Телефон</th>
            <th>Мест</th>
            <th>Посадка</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let token = '';
let allOrders = [];

async function doLogin() {
  const pass = document.getElementById('passInput').value;
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  try {
    const res = await fetch('/api/admin/login.php', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pass })
    });
    const data = await res.json();
    if (data.success) {
      token = data.token;
      sessionStorage.setItem('adminToken', token);
      showAdmin();
    } else {
      err.style.display = 'block';
    }
  } catch {
    err.style.display = 'block';
    err.textContent = 'Ошибка соединения';
  }
}

function logout() {
  token = '';
  sessionStorage.removeItem('adminToken');
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
}

async function showAdmin() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'block';
  await loadOrders();
}

async function loadOrders() {
  const res = await fetch('/api/admin/orders.php', {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  allOrders = await res.json();
  allOrders.sort((a,b) => b.id - a.id);
  renderStats();
  renderChart();
  renderExcFilter();
  renderTable();
}

function renderStats() {
  const totalSeats = allOrders.reduce((s, o) => s + (o.seats || 0), 0);
  const excSet = new Set(allOrders.map(o => o.excursion));
  const pickupCounts = {};
  allOrders.forEach(o => { pickupCounts[o.pickup] = (pickupCounts[o.pickup] || 0) + 1; });
  const topPickup = Object.entries(pickupCounts).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-val">${allOrders.length}</div><div class="stat-label">Всего заказов</div></div>
    <div class="stat-card"><div class="stat-icon">💺</div><div class="stat-val">${totalSeats}</div><div class="stat-label">Зарезервировано мест</div></div>
    <div class="stat-card"><div class="stat-icon">🗺️</div><div class="stat-val">${excSet.size}</div><div class="stat-label">Экскурсий заказано</div></div>
    <div class="stat-card"><div class="stat-icon">📍</div><div class="stat-val" style="font-size:1.1rem">${topPickup ? topPickup[0].split(' ')[0] : '—'}</div><div class="stat-label">Популярная остановка</div></div>
  `;
}

function renderChart() {
  const counts = {};
  allOrders.forEach(o => { counts[o.excursion] = (counts[o.excursion] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;
  const chart = document.getElementById('barChart');
  if (!sorted.length) { chart.innerHTML = '<div style="color:#aaa;font-size:.9rem">Нет данных</div>'; return; }
  chart.innerHTML = sorted.map(([name, cnt]) => `
    <div class="bar-row">
      <div class="bar-label" title="${name}">${name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(cnt/max*100).toFixed(1)}%"></div></div>
      <div class="bar-count">${cnt}</div>
    </div>`).join('');
}

function renderExcFilter() {
  const excSet = [...new Set(allOrders.map(o => o.excursion))].sort();
  const sel = document.getElementById('excFilter');
  sel.innerHTML = '<option value="">Все экскурсии</option>' +
    excSet.map(e => `<option>${e}</option>`).join('');
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const excF = document.getElementById('excFilter').value;
  const pickF = document.getElementById('pickupFilter').value;

  const filtered = allOrders.filter(o => {
    const text = `${o.firstName} ${o.lastName} ${o.phone}`.toLowerCase();
    return (!search || text.includes(search))
        && (!excF || o.excursion === excF)
        && (!pickF || o.pickup === pickF);
  });

  const tbody = document.getElementById('ordersBody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="no-orders"><i class="fa fa-inbox" style="font-size:2rem;display:block;margin-bottom:10px"></i>Заказов не найдено</div></td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map((o, i) => `
    <tr>
      <td style="color:#aaa;font-size:.8rem">${filtered.length - i}</td>
      <td style="white-space:nowrap">${new Date(o.date).toLocaleString('ru-RU', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
      <td><span class="badge badge-blue">${o.excursion}</span></td>
      <td>${o.firstName}</td>
      <td>${o.lastName}</td>
      <td>${o.phone}</td>
      <td style="text-align:center;font-weight:700">${o.seats}</td>
      <td>${o.pickup}</td>
      <td><button class="del-btn" onclick="deleteOrder(${o.id})"><i class="fa fa-trash"></i></button></td>
    </tr>`).join('');
}

async function deleteOrder(id) {
  if (!confirm('Удалить этот заказ?')) return;
  await fetch('/api/admin/orders.php/' + id, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  });
  allOrders = allOrders.filter(o => o.id !== id);
  renderStats(); renderChart(); renderTable();
}

function exportCSV() {
  const rows = [['ID','Дата','Экскурсия','Имя','Фамилия','Телефон','Мест','Посадка']];
  allOrders.forEach(o => rows.push([
    o.id, new Date(o.date).toLocaleString('ru-RU'), o.excursion,
    o.firstName, o.lastName, o.phone, o.seats, o.pickup
  ]));
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,﻿' + encodeURIComponent(csv);
  a.download = `kedem-orders-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// Auto-login from session
const saved = sessionStorage.getItem('adminToken');
if (saved) { token = saved; showAdmin(); }
</script>
</body>
</html>
