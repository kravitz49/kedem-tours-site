<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c96a"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d878"/>
      <stop offset="100%" style="stop-color:#b8942a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Фон -->
  <rect width="400" height="140" rx="16" fill="url(#bgGrad)"/>

  <!-- Декоративная линия сверху -->
  <rect x="0" y="0" width="400" height="4" rx="2" fill="url(#goldGrad)"/>

  <!-- ИКОНКА — круг с компасом -->
  <circle cx="70" cy="70" r="50" fill="none" stroke="url(#goldGrad2)" stroke-width="2.5" opacity="0.6"/>
  <circle cx="70" cy="70" r="42" fill="rgba(201,168,76,0.12)"/>

  <!-- Компас — внешние стрелки -->
  <!-- Север (золотой) -->
  <polygon points="70,28 62,58 70,52 78,58" fill="url(#goldGrad2)" filter="url(#shadow)"/>
  <!-- Юг (белый) -->
  <polygon points="70,112 62,82 70,88 78,82" fill="rgba(255,255,255,0.7)"/>
  <!-- Восток -->
  <polygon points="112,70 82,62 88,70 82,78" fill="rgba(255,255,255,0.5)"/>
  <!-- Запад -->
  <polygon points="28,70 58,62 52,70 58,78" fill="rgba(255,255,255,0.5)"/>

  <!-- Центральный круг компаса -->
  <circle cx="70" cy="70" r="10" fill="url(#bgGrad)" stroke="url(#goldGrad2)" stroke-width="2"/>
  <circle cx="70" cy="70" r="4" fill="url(#goldGrad2)"/>

  <!-- Декоративные точки по кругу -->
  <circle cx="70" cy="23" r="2.5" fill="url(#goldGrad2)"/>
  <circle cx="70" cy="117" r="2.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="117" cy="70" r="2.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="23" cy="70" r="2.5" fill="rgba(255,255,255,0.4)"/>

  <!-- ТЕКСТ -->
  <!-- КЕДЕМ -->
  <text x="155" y="58"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="bold"
    letter-spacing="6"
    fill="url(#goldGrad2)"
    filter="url(#shadow)">КЕДЕМ</text>

  <!-- разделитель -->
  <line x1="155" y1="72" x2="385" y2="72" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7"/>

  <!-- ТУРС -->
  <text x="161" y="100"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="normal"
    letter-spacing="14"
    fill="rgba(255,255,255,0.85)">ТУРС</text>

  <!-- Подпись -->
  <text x="155" y="122"
    font-family="Arial, sans-serif"
    font-size="10"
    letter-spacing="3.5"
    fill="rgba(201,168,76,0.8)">ЭКСКУРСИИ ПО ИЗРАИЛЮ</text>

</svg>
